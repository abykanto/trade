# Trade Manager — Python brain + API. MT5 terminal stays on the host; attach
# TradeIdeaExecutor EA and point InpPythonHost at this machine (localhost or
# host IP). Published port 19520 accepts the EA TCP connection.
#
# All paths and runtime settings are driven by .env (see RUNTIME_DIR, DATABASE_URL, etc.).
services:
  trade:
    build: .
    container_name: trade-manager
    ports:
      - "${API_PORT:-8001}:8001"
      - "${EA_SERVER_PORT:-19520}:19520"
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app
    volumes:
      - ./${RUNTIME_DIR:-tmp}:/app/${RUNTIME_DIR:-tmp}
      - ./${DATABASE_PATH:-trade_ideas.db}:/app/${DATABASE_PATH:-trade_ideas.db}
    restart: unless-stopped
